<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Conheça a História dos Santos - Manual do Católico</title>
  
  <link rel="icon" type="image/png" href="../assets/images/og-image.png">
  <link rel="shortcut icon" href="../assets/images/og-image.png">
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#8B5A2B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="../assets/images/og-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="../css/bootstrap.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/santos.css" />

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9507443008988172" crossorigin="anonymous"></script>
</head>
<body>
  <div class="background-wrapper">
    <main class="container py-3">
      
      <a href="../index.html" class="btn-voltar mb-3">
        <ion-icon name="arrow-back"></ion-icon>
        <span>Voltar</span>
      </a>

      <h1 class="page-title text-center mb-4">Conheça a História dos Santos</h1>

      <!-- Barra de Pesquisa -->
      <div class="search-container mb-4">
        <ion-icon name="search" class="search-icon"></ion-icon>
        <input type="text" id="search-input" class="search-input" placeholder="Buscar santo..." />
        <button id="clear-search" class="clear-search" style="display: none;">
          <ion-icon name="close-circle"></ion-icon>
        </button>
      </div>

      <!-- Lista de Santos -->
      <div id="santos-list" class="santos-list"></div>

      <!-- Mensagem vazia -->
      <div id="empty-message" class="empty-container" style="display: none;">
        <ion-icon name="person-outline" size="48"></ion-icon>
        <p>Nenhum santo encontrado.</p>
        <small>Tente buscar por outro nome.</small>
      </div>

      <div style="height: 80px;"></div>
    </main>

    <!-- Banner de Anúncio -->
    <footer class="ad-banner">
      <div class="ad-placeholder"><small>Espaço para anúncio</small></div>
    </footer>
  </div>

  <script src="../js/bootstrap.bundle.min.js"></script>
  <script src="../data/santosdata.js"></script>
  <script src="../js/santos.js"></script>
</body>
</html>
