<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#8B5A2B"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Prece - Manual do Católico</title>

  <link rel="stylesheet" href="../css/bootstrap.min.css" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/preces.css" />
</head>
<body>
  <div class="background-wrapper">
    <main class="container py-3">
      
      <a href="preces.html" class="btn-voltar mb-3">
        <ion-icon name="arrow-back"></ion-icon>
        <span>Voltar</span>
      </a>

      <!-- Loading -->
      <div id="loading" class="text-center py-5">
        <div class="spinner-border text-brown" role="status"></div>
        <p class="mt-3 text-brown">Carregando prece...</p>
      </div>

      <!-- Conteúdo -->
      <div id="prece-content" style="display: none;">
        
        <!-- Cabeçalho -->
        <div class="prece-header text-center mb-4">
          <h1 id="prece-nome" class="prece-title"></h1>
          <div class="divider"></div>
        </div>

        <!-- Corpo da Prece -->
        <div class="prece-body">
          <div id="prece-texto" class="prece-texto"></div>
        </div>

        <!-- Botão Amém -->
        <div class="text-center mt-4">
          <button id="btn-amen" class="btn-amen">
            Amém
          </button>
        </div>

        <!-- Rodapé -->
        <div class="prece-footer text-center mt-4">
          <p class="footer-text">Que a paz de Cristo reine em seus corações.</p>
        </div>

      </div>
    </main>

    <!-- Banner de Anúncio -->
    <footer class="ad-banner">
      <div class="ad-placeholder"><small>Espaço para anúncio</small></div>
    </footer>
  </div>

  <script src="../js/bootstrap.bundle.min.js"></script>
  <script src="../data/precesdata.js"></script>
  <script src="../js/preces.js"></script>
</body>
</html>
