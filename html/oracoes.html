<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#8B5A2B"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Orações - Manual do Católico</title>

  <link rel="stylesheet" href="../css/bootstrap.min.css" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/oracoes.css" />
</head>
<body>
  <div class="background-wrapper">
    <main class="container py-3">
      
      <!-- Botão Voltar -->
      <a href="../index.html" class="btn-voltar mb-3">
        <ion-icon name="arrow-back"></ion-icon>
        <span>Voltar</span>
      </a>

      <h1 class="page-title text-center mb-4">Orações</h1>

      <!-- Barra de Pesquisa -->
      <div class="search-container mb-3">
        <ion-icon name="search" class="search-icon"></ion-icon>
        <input type="text" id="search-input" class="search-input" placeholder="Buscar oração..." />
        <button id="clear-search" class="clear-search" style="display: none;">
          <ion-icon name="close-circle"></ion-icon>
        </button>
      </div>

      <!-- Botão Favoritos -->
      <div class="filtro-container mb-4">
        <button id="btn-favoritas" class="filtro-btn">
          <ion-icon name="heart-outline" id="icon-favoritas"></ion-icon>
          <span id="texto-favoritas">Favoritas</span>
        </button>
      </div>

      <!-- Contador de resultados -->
      <p id="resultados-count" class="resultados-text text-center mb-3"></p>

      <!-- Grid de Cards -->
      <div id="oracoes-grid" class="oracoes-grid"></div>

      <!-- Mensagem vazia -->
      <div id="empty-message" class="empty-container" style="display: none;">
        <ion-icon name="heart-dislike-outline" size="48"></ion-icon>
        <p id="empty-title">Nenhuma oração encontrada.</p>
        <small id="empty-subtitle">Tente buscar por outro nome.</small>
      </div>

      <div style="height: 80px;"></div>
    </main>

    <!-- Banner de Anúncio -->
    <footer class="ad-banner">
      <div class="ad-placeholder"><small>Espaço para anúncio</small></div>
    </footer>
  </div>

  <script src="../js/bootstrap.bundle.min.js"></script>
  <script src="../data/oracoesdata.js"></script>
  <script src="../js/oracoes.js"></script>
</body>
</html>
