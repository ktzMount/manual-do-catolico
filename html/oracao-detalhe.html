<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#8B5A2B"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Oração - Manual do Católico</title>

  <link rel="stylesheet" href="../css/bootstrap.min.css" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/oracoes.css" />
</head>
<body>
  <div class="background-wrapper">
    <main class="container py-3">
      
      <!-- Botão Voltar -->
      <a href="oracoes.html" class="btn-voltar mb-3">
        <ion-icon name="arrow-back"></ion-icon>
        <span>Voltar</span>
      </a>

      <!-- Loading -->
      <div id="loading" class="text-center py-5">
        <div class="spinner-border text-brown" role="status"></div>
        <p class="mt-3 text-brown">Carregando oração...</p>
      </div>

      <!-- Conteúdo -->
      <div id="oracao-content" style="display: none;">
        
        <!-- Imagem com Halo (igual ao mobile) -->
        <div class="image-container text-center mb-4">
          <div class="image-halo">
            <img id="oracao-imagem" src="" alt="" class="oracao-imagem" />
          </div>
        </div>

        <!-- Card da Oração -->
        <div class="card-oracao">
          <h1 id="oracao-nome" class="oracao-title"></h1>
          <div class="divider"></div>
          <p id="oracao-texto" class="oracao-texto"></p>
        </div>

        <!-- Botão Amém (com gradiente igual ao mobile) -->
        <div class="text-center mt-4">
          <button id="btn-amen" class="btn-amen">
            Amém
          </button>
        </div>

        <!-- Botão Favoritar flutuante -->
        <button id="btn-favorito-detalhe" class="btn-favorito-float" title="Favoritar">
          <ion-icon name="heart-outline" id="icon-favorito-detalhe"></ion-icon>
        </button>

      </div>
    </main>

    <!-- Banner de Anúncio -->
    <footer class="ad-banner">
      <div class="ad-placeholder"><small>Espaço para anúncio</small></div>
    </footer>
  </div>

  <script src="../js/bootstrap.bundle.min.js"></script>
  <script src="../data/oracoesdata.js"></script>
  <script src="../js/oracoes.js"></script>
</body>
</html>
